Full_TRKR_CLUSTER_run3oo:
  params:
    dsttype:     DST_TRKR_CLUSTER
    period:      run3oo
    physicsmode: physics
    dataset:     run3oo
    build:       PROD
    dbtag:       TAG
    version:     VERSION

  input:
    db:          fcr
    table:       datasets
    intriplet:   PROD_TAG_VERSION
    # cut_segment: 10
  job:
    script:                 run_rolloverjob0.sh
    log:                   '{condor}/{logbase}.condor'
    neventsper:             1000
    payload:                [../tracking_code/*]
    request_memory:         8192 MB, 12092 MB, 16092 MB 
    request_cpus:          '1'
    batch_name:            '{rule_name}_{dataset}_{outtriplet}'
    priority:              '60'

