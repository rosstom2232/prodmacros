#______________________________________________________________________________
prod1_TRIGGERED_EVENT_run3oo:
  params:
    dsttype:      DST_TRIGGERED_EVENT
    period:       run3oo
    physicsmode:  physics
    dataset:      run3oo
    build:        PROD
    dbtag:        TAG
    version:      VERSION

  input:
    db:             rawr
    table:          datasets
    min_run_time:   300
    min_run_events: 100000

  job:
    script:                 run_eventcombine.sh
    log:                   '{condor}/{logbase}.condor'
    neventsper:             10000
    payload:                [../triggered_code/*]
    request_memory:         2 GB, 3 GB, 5 GB
    request_xferslots:     '3'    
    batch_name:            '{rule_name}_{dataset}_{outtriplet}'
    priority:              '90'
    filesystem:
      logdir:   "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/log"
      histdir:  "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/hist"
      condor:            "/tmp/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/log"

#______________________________________________________________________________
prod1_CALOFITTING_run3oo:
  params:
    dsttype:      DST_CALOFITTING
    period:       run3oo
    physicsmode:  physics
    dataset:      run3oo
    build:        PROD
    dbtag:        TAG
    version:      VERSION

  input:
    db:           fcr
    table:        datasets
    intriplet:    PROD_TAG_VERSION  # This is the output triplet of the previous rule

  job:
    script:                 run_fitting.sh
    log:                   '{condor}/{logbase}.condor'
    neventsper:             100000
    payload:                [../calo_code/*]
    request_memory:         2500MB, 4GB, 6GB
    request_cpus:          '1'
    batch_name:            '{rule_name}_{dataset}_{outtriplet}'
    priority:              '60'
    filesystem:
      logdir:   "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/log"
      histdir:  "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/hist"
      condor:            "/tmp/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/log"

